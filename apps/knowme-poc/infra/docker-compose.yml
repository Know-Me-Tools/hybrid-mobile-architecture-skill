# TJ-ARCH-MOB-001 compliant
# Local-first sync infrastructure for the KnowMe PoC (C-106, plan decision 2).
#
# One machine serves BOTH surfaces: the Tauri desktop app on the host and the iOS
# simulator (which shares the host's network, so localhost works from both).
#
#   docker compose -f apps/knowme-poc/infra/docker-compose.yml up -d
#
# Pins are Rule 22/23 — verified against the Docker Hub API on 2026-07-16 and recorded
# in the phase decision-log. Electric 1.7.x is the v1.x wire protocol that
# `gen_ui_db::sync`'s shape consumer already targets (/v1/shape, offset=-1 initial sync,
# electric-handle/electric-offset headers, must-refetch rotation).
services:
  postgres:
    # Matches the CLAUDE.md cloud tier (PostgreSQL 18) and Electric's own dev compose,
    # so local infra and the eventual cloud target agree.
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: knowme
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password   # local demo only — never a deployed credential
    ports:
      - '54321:5432'                # non-default: avoids colliding with a host Postgres
    volumes:
      - ./postgres.conf:/etc/postgresql.conf:ro
      - ./init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - knowme_pgdata:/var/lib/postgresql/data
    command: ['-c', 'config_file=/etc/postgresql.conf']
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  electric:
    image: electricsql/electric:1.7.7@sha256:15e9a25d5f6c515ad9113392291e34c6751b8b31d563ee4c496fde499a5ce14f
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/knowme?sslmode=disable
      # Open mode for the local demo: no auth proxy in front of /v1/shape. Do NOT copy
      # this into any deployed configuration.
      ELECTRIC_INSECURE: 'true'
    ports:
      - '3000:3000'                 # ELECTRIC_URL for both surfaces: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  knowme_pgdata:
