# TJ-ARCH-MOB-001 compliant
# Postgres config for the local-first sync demo (C-106).
# Values taken from ElectricSQL's own dev config (packages/sync-service/dev/postgres.conf
# @ main, verified 2026-07-16) — Electric REQUIRES logical replication.
listen_addresses = '*'
wal_level = logical          # Electric's hard requirement — it reads the logical WAL
max_replication_slots = 100  # one slot per active shape subscription
max_connections = 200
