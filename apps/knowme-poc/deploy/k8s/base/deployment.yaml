apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowme-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knowme-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knowme-web
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: knowme-web
          image: knowme-web:local
          imagePullPolicy: IfNotPresent
          env:
            - name: KNOWME_BIND
              value: 0.0.0.0:8080
            - name: KNOWME_DATA_DIR
              value: /var/lib/knowme
            - name: RUST_LOG
              value: info
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/v1/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: data
              mountPath: /var/lib/knowme
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: knowme-web-data
        - name: tmp
          emptyDir: {}
