[package]
name = "gen_ui_ffi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
gen_ui_types    = { path = "../gen_ui_types" }
gen_ui_runtime  = { path = "../gen_ui_runtime" }
gen_ui_protocol = { path = "../gen_ui_protocol" }
gen_ui_agent    = { path = "../gen_ui_agent" }
# `anyhow` feature (also enabled on the workspace's own flutter_rust_bridge
# entry, but this crate pins an exact version below rather than inheriting
# via `.workspace = true`, so the feature must be re-declared here too) is
# what lets frb turn `Result<T, E: std::error::Error>` returns like
# `chat_send`'s `CoreResult<String>` into a plain `Future<T>` that throws a
# Dart exception on `Err`, instead of an opaque `CoreResult<T>` handle.
flutter_rust_bridge = { version = "=2.12.0", features = ["anyhow"] }
anyhow.workspace = true
log = "0.4"
# chat_events serializes A2uiEvent to JSON for the frb wire (see streams.rs
# module doc — the freezed/riverpod_generator dependency conflict blocks
# native frb type mirroring for enums with data-carrying variants).
serde_json.workspace = true
# `sync` for tokio::sync::broadcast::error::RecvError, referenced by the
# frb-streams-gated chat_events forwarder (streams.rs). gen_ui_ffi is the
# mobile FFI leaf (iOS/Android cdylib/staticlib) and is never built for wasm32,
# so this is unconditional (unlike gen_ui_db's target-split, which exists
# because that crate ALSO ships a wasm32 build for the web PGlite path).
tokio           = { workspace = true, features = ["sync"] }

[features]
# Enable AFTER `flutter_rust_bridge_codegen generate` has produced frb_generated.rs
# (the project build turns it on). The stream fns reference the codegen-emitted
# crate-local `StreamSink<T>`, so pre-codegen `cargo check` leaves this off.
frb-streams = []

[lints.rust]
# `#[frb(...)]` expands to code guarded by `cfg(frb_expand)`, a cfg name that only
# codegen defines. Declare it expected so the pre-codegen build is warning-clean
# under `-D warnings` (the clippy inner loop).
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }

[target.'cfg(target_os = "android")'.dependencies]
android_logger = "0.14"
[target.'cfg(target_os = "ios")'.dependencies]
oslog = "0.2"
