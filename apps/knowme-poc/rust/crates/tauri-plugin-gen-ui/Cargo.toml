[package]
name = "tauri-plugin-gen-ui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

links = "tauri-plugin-gen-ui"

[dependencies]
gen_ui_types    = { path = "../gen_ui_types" }
gen_ui_runtime  = { path = "../gen_ui_runtime" }
gen_ui_protocol = { path = "../gen_ui_protocol" }
gen_ui_agent    = { path = "../gen_ui_agent" }
# ConfigStore trait only (default features, no pg/pglite) — dev_ollama.rs's
# in-memory smoke-test ConfigStore needs the trait, not a real backend (T10).
gen_ui_db       = { path = "../gen_ui_db" }
async-trait.workspace = true
log = "0.4"
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tauri = { version = "2", default-features = false }
# `sync` for tokio::sync::broadcast::error::RecvError, used by chat_subscribe's
# forwarding loop. Desktop-only crate (never wasm32), so unconditional.
tokio           = { workspace = true, features = ["sync"] }

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }

[package.metadata.docs.rs]
# Desktop plugin: never built for mobile/wasm targets.
targets = ["x86_64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-pc-windows-msvc"]
