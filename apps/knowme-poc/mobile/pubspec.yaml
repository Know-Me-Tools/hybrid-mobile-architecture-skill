name: knowme_poc
description: "knowme-poc — Hybrid mobile application (Prometheus AGS / TJ-ARCH-MOB-001)"
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Shared Prometheus packages (published to pub.dev; path deps in-repo) ──
  gen_ui_flutter:
    path: ../flutter_packages/gen_ui_flutter
  gen_ui_widgets:
    path: ../flutter_packages/gen_ui_widgets
  prometheus_entity_management:
    path: ../flutter_packages/prometheus_entity_management

  # ── State management (Riverpod 3) ────────────────────────────────────────
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  riverpod_sqflite: ^0.4.3     # offline provider-cache persistence (Riverpod 3)

  # ── Models ───────────────────────────────────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ── FFI bridge ───────────────────────────────────────────────────────────
  flutter_rust_bridge: 2.12.0

  # ── UI components (shadcn/ui equivalent) ─────────────────────────────────
  shadcn_flutter: ^0.0.53

  # ── Navigation ───────────────────────────────────────────────────────────
  go_router: ^15.0.0

  # ── Markdown + code highlighting ─────────────────────────────────────────
  markdown_widget: ^2.3.2+6
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # ── Typography / motion ──────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # ── Storage / auth ───────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  supabase_flutter: ^2.8.0

  # ── Utilities ────────────────────────────────────────────────────────────
  gap: ^3.0.1
  uuid: ^4.5.1
  intl: ^0.20.2
  path_provider: ^2.1.4
  collection: ^1.19.0
  gen_ui_ffi:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.4
  alchemist: ^0.12.0           # deterministic golden tests (VGV workflow) — no mocks

flutter:
  uses-material-design: true
