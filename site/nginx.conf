server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  location /assets/ { try_files $uri =404; expires 1y; add_header Cache-Control "public, max-age=31536000, immutable"; }
  location /img/ { try_files $uri =404; expires 1y; add_header Cache-Control "public, max-age=31536000, immutable"; }
  location / { try_files $uri $uri.html $uri/ =404; add_header Cache-Control "public, max-age=300"; }
}
