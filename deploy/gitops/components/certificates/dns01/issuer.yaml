apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: {name: letsencrypt-wildcard-production}
spec:
  acme:
    email: platform@example.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef: {name: letsencrypt-wildcard-production-account}
    solvers:
      - selector: {dnsZones: [example.com]}
        dns01:
          cloudDNS: {project: PROJECT_ID}
