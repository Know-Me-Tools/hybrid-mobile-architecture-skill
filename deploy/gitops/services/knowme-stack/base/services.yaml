apiVersion: v1
kind: Service
metadata: {name: knowme-web}
spec:
  selector: {app.kubernetes.io/name: knowme-web}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: v1
kind: Service
metadata: {name: flint-forge-gateway}
spec:
  selector: {app.kubernetes.io/name: flint-forge-gateway}
  ports: [{name: http, port: 8080, targetPort: http}]
---
apiVersion: v1
kind: Service
metadata: {name: flint-gate}
spec:
  selector: {app.kubernetes.io/name: flint-gate}
  ports: [{name: http, port: 4456, targetPort: http}, {name: admin, port: 4457, targetPort: admin}]
---
apiVersion: v1
kind: Service
metadata: {name: flint-realtime-fabric}
spec:
  selector: {app.kubernetes.io/name: flint-realtime-fabric}
  ports: [{name: http, port: 8080, targetPort: http}, {name: grpc, port: 9090, targetPort: grpc}]
---
apiVersion: v1
kind: Service
metadata: {name: iggy}
spec:
  selector: {app.kubernetes.io/name: iggy}
  ports: [{name: tcp, port: 8090, targetPort: tcp}]
