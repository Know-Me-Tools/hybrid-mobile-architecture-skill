apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources: [../../base, secret-provider.yaml]
patches:
  - target: {kind: ServiceAccount, name: knowme-runtime}
    patch: |-
      - op: add
        path: /metadata/annotations
        value: {azure.workload.identity/client-id: MANAGED_IDENTITY_CLIENT_ID}
  - target: {kind: Deployment}
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/azure.workload.identity~1use
        value: "true"
