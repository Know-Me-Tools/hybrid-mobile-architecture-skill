apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources: [../../base, secret-provider.yaml]
patches:
  - target: {kind: ServiceAccount, name: knowme-runtime}
    patch: |-
      - op: add
        path: /metadata/annotations
        value: {iam.gke.io/gcp-service-account: knowme-runtime@PROJECT_ID.iam.gserviceaccount.com}
