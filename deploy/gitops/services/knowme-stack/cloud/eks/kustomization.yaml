apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources: [../../base, secret-provider.yaml]
patches:
  - target: {kind: ServiceAccount, name: knowme-runtime}
    patch: |-
      - op: add
        path: /metadata/annotations
        value: {eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/knowme-runtime"}
