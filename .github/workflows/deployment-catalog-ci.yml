name: Deployment catalog CI

on:
  pull_request:
    paths: ["deploy/**", ".github/workflows/deployment-*.yml", "apps/knowme-poc/Dockerfile"]
  push:
    branches: [main]
    paths: ["deploy/**", ".github/workflows/deployment-*.yml", "apps/knowme-poc/Dockerfile"]

permissions: {contents: read}

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: bash deploy/scripts/validate-catalog.sh
      - run: bash deploy/scripts/validate-gitops.sh

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions: {contents: read, packages: read}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6
        with:
          files: deploy/docker-bake.hcl
          targets: validate
          set: "*.platform=linux/amd64"
          push: false
